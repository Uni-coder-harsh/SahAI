name: SahAI CI/CD Production Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-lint:
    name: Lint, Test, and Verify Math
    runs-on: ubuntu-latest

    steps:
    - name: Checkout monorepo with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: TruffleHog OSS Secret Scan
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ""
        head: HEAD
        extra_args: --only-verified

    # 1. Setup Node Environment and Test
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache-dependency-path: services/api-node/package-lock.json

    - name: Install Node API dependencies
      run: |
        cd services/api-node
        npm ci

    # 2. Setup Python Environment and Run Pytest
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        cache-dependency-path: services/engine-python/requirements.txt

    - name: Install Python Engine dependencies
      run: |
        pip install -r services/engine-python/requirements.txt

    - name: Run Python Bayesian Math Tests
      run: |
        PYTHONPATH=services/engine-python/src pytest services/engine-python/tests/test_math.py

  build-and-push:
    name: Build & Push Microservices
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout monorepo with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build and push Node.js API Gateway image
    - name: Build and Push API Node Image
      uses: docker/build-push-action@v5
      with:
        context: ./services/api-node
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/sahai-api-node:latest
          ${{ secrets.DOCKER_USERNAME }}/sahai-api-node:${{ github.sha }}

    # Build and push Python Inference Engine image
    - name: Build and Push Engine Python Image
      uses: docker/build-push-action@v5
      with:
        context: ./services/engine-python
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/sahai-engine-python:latest
          ${{ secrets.DOCKER_USERNAME }}/sahai-engine-python:${{ github.sha }}

    # Build and push ML Training image
    - name: Build and Push ML Training Image
      uses: docker/build-push-action@v5
      with:
        context: ./services/ml-training
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/sahai-ml-training:latest
          ${{ secrets.DOCKER_USERNAME }}/sahai-ml-training:${{ github.sha }}
